name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Create index.html for GitHub Pages
        run: |
          # Find the JS and CSS entry files in dist/client/assets
          JS_FILE=$(ls dist/client/assets/*.js | head -1 | xargs basename)
          CSS_FILE=$(ls dist/client/assets/*.css 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo '')
          BASE="/evolution-lines-folio"
          CSS_TAG=""
          if [ -n "$CSS_FILE" ]; then
            CSS_TAG="<link rel=\"stylesheet\" href=\"$BASE/assets/$CSS_FILE\">"
          fi
          cat > dist/client/index.html << EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Coastal Evolution Builders</title>
            $CSS_TAG
          </head>
          <body>
            <div id="root"></div>
            <script type="module" src="$BASE/assets/$JS_FILE"></script>
          </body>
          </html>
          EOF
          echo "Created index.html with JS: $JS_FILE and CSS: $CSS_FILE"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
